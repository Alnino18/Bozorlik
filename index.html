<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOZORLIK</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-startup-image" href="splash.png">
</head>
<body>
  <div class="app">
    <h1>     🛒 BOZORLIK</h1>
    <div id="markets" class="market-buttons">
      <button onclick="setMarket('Куйлик', this)">Куйлик 🏬</button>
      <button onclick="setMarket('Фут Сити', this)">Фут Сити 🛍️</button>
      <button onclick="setMarket('Эко', this)">Эко 🌱</button>
      <button onclick="setMarket('Бошка', this)">Бошка ⚡</button>
    </div>

    <input id="cash" type="number" placeholder="Касса (сум)">
    <input id="itemInput" placeholder="Мош 10кг (15) 150000">
    <button onclick="addItem()">+ Қўшиш</button>

    <div id="list"></div>
    <button class="finish" onclick="finish()">✅ Тугатиш</button>
    <pre id="report"></pre>
  </div>
  <script src="app.js"></script>
</body>
</html>
