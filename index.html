<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOZORLIK</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-startup-image" href="splash.png">
</head>
<body>
  <div class="app">
    <h1>🛒 BOZORLIK</h1>
    <div class="form">
      <select id="market">
        <option value="Куйлик">Куйлик</option>
        <option value="Фут Сити">Фут Сити</option>
        <option value="Эко">Эко</option>
        <option value="Бошка">Бошка</option>
      </select>
      <input id="cash" type="number" placeholder="Касса (сум)">
      <input id="name" placeholder="Товар номи">
      <input id="kg" type="number" placeholder="Кг">
      <input id="price" type="number" placeholder="Нархи">
      <button onclick="addItem()">+ Қўшиш</button>
    </div>
    <div id="list"></div>
    <button class="finish" onclick="finish()">✅ Тугатиш</button>
    <pre id="report"></pre>
  </div>
  <script src="app.js"></script>
</body>
</html>
